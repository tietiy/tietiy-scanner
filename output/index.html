<!DOCTYPE html>
<html lang="en">
<head>

  <!-- ── META ─────────────────────────────────── -->
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1,
                 viewport-fit=cover">
  <meta name="description"
        content="TIE TIY — NSE Equity Scanner">

  <!-- ── PWA — iOS HOME SCREEN ─────────────────── -->
  <meta name="apple-mobile-web-app-capable"
        content="yes">
  <meta name="apple-mobile-web-app-status-bar-style"
        content="black-translucent">
  <meta name="apple-mobile-web-app-title"
        content="TIE TIY">
  <meta name="mobile-web-app-capable"
        content="yes">
  <meta name="theme-color"
        content="#07070f">

  <!-- ── PWA MANIFEST ──────────────────────────── -->
  <link rel="manifest"
        href="manifest.json">

  <!-- ── APPLE TOUCH ICONS ─────────────────────── -->
  <link rel="apple-touch-icon"
        href="icon-192.png">
  <link rel="apple-touch-icon"
        sizes="192x192"
        href="icon-192.png">
  <link rel="apple-touch-icon"
        sizes="512x512"
        href="icon-512.png">

  <title>TIE TIY Scanner</title>

  <!-- ── BASE STYLES ───────────────────────────── -->
  <style>
    * {
      box-sizing: border-box;
      margin:     0;
      padding:    0;
    }

    html, body {
      height:     100%;
      background: #07070f;
      color:      #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont,
                   'Segoe UI', Arial, sans-serif;
      font-size:  14px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      max-width:      600px;
      margin:         0 auto;
      padding:        0 0 80px 0;
      overflow-x:     hidden;
    }

    /* ── LOADING SCREEN ─────────────────────── */
    #app-loader {
      display:         flex;
      flex-direction:  column;
      align-items:     center;
      justify-content: center;
      height:          100vh;
      gap:             16px;
      color:           #8b949e;
      font-size:       13px;
    }

    #app-loader .logo {
      color:       #ffd700;
      font-size:   24px;
      font-weight: 700;
    }

    #app-loader .spinner {
      width:        28px;
      height:       28px;
      border:       3px solid #21262d;
      border-top:   3px solid #ffd700;
      border-radius: 50%;
      animation:    spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── ERROR SCREEN ───────────────────────── */
    #app-error {
      display:    none;
      padding:    40px 20px;
      text-align: center;
      color:      #8b949e;
      font-size:  13px;
    }

    #app-error .err-title {
      color:       #f85149;
      font-size:   16px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    /* ── MAIN APP ───────────────────────────── */
    #app-root {
      display: none;
    }

    /* ── SCROLLBAR ──────────────────────────── */
    ::-webkit-scrollbar {
      width:  4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #07070f;
    }
    ::-webkit-scrollbar-thumb {
      background:    #21262d;
      border-radius: 2px;
    }

    /* ── SAFE AREA — iPhone notch ───────────── */
    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── PIN GATE ───────────────────────────── */
    #pin-gate {
      position:        fixed;
      top:             0;
      left:            0;
      right:           0;
      bottom:          0;
      background:      #07070f;
      z-index:         9999;
      display:         flex;
      flex-direction:  column;
      align-items:     center;
      justify-content: center;
      font-family:     -apple-system, BlinkMacSystemFont,
                       'Segoe UI', Arial, sans-serif;
    }

    #pin-gate .pin-card {
      text-align:    center;
      max-width:     320px;
      width:         90%;
      padding:       36px 28px;
      background:    #0d1117;
      border:        1px solid #21262d;
      border-radius: 20px;
    }

    #pin-gate .pin-lock {
      font-size:     44px;
      margin-bottom: 12px;
    }

    #pin-gate .pin-title {
      color:         #ffd700;
      font-size:     22px;
      font-weight:   700;
      margin-bottom: 4px;
    }

    #pin-gate .pin-sub {
      color:         #444;
      font-size:     11px;
      margin-bottom: 28px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #pin-input {
      width:          100%;
      background:     #07070f;
      border:         1px solid #30363d;
      border-radius:  10px;
      color:          #c9d1d9;
      font-size:      28px;
      letter-spacing: 12px;
      padding:        14px 12px;
      text-align:     center;
      outline:        none;
      margin-bottom:  8px;
      transition:     border-color 0.2s;
      -webkit-text-security: disc;
    }

    #pin-input:focus {
      border-color: #ffd700;
    }

    #pin-error {
      color:         #f85149;
      font-size:     11px;
      height:        18px;
      margin-bottom: 12px;
      transition:    opacity 0.2s;
    }

    #pin-remember-row {
      display:         flex;
      align-items:     center;
      justify-content: center;
      gap:             8px;
      color:           #555;
      font-size:       12px;
      margin-bottom:   20px;
      cursor:          pointer;
    }

    #pin-remember-row input[type="checkbox"] {
      width:          15px;
      height:         15px;
      accent-color:   #ffd700;
      cursor:         pointer;
    }

    #pin-unlock-btn {
      width:          100%;
      background:     #ffd700;
      color:          #000;
      border:         none;
      border-radius:  10px;
      padding:        14px;
      font-size:      15px;
      font-weight:    700;
      cursor:         pointer;
      transition:     opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #pin-unlock-btn:active {
      opacity: 0.8;
    }
  </style>

</head>
<body>

  <!-- ── PIN GATE ─────────────────────────────────── -->
  <!-- Secret injected by deploy.yml via sed          -->
  <!-- Never stored in repo — only in GitHub secrets  -->
  <div id="pin-gate">
    <div class="pin-card">
      <div class="pin-lock">🔒</div>
      <div class="pin-title">TIE TIY</div>
      <div class="pin-sub">NSE Scanner</div>

      <input id="pin-input"
        type="password"
        inputmode="numeric"
        maxlength="4"
        autocomplete="off"
        placeholder="● ● ● ●"
        onkeydown="if(event.key==='Enter')
          _pinUnlock()">

      <div id="pin-error"></div>

      <label id="pin-remember-row">
        <input type="checkbox" id="pin-remember">
        Remember this device
      </label>

      <button id="pin-unlock-btn"
        onclick="_pinUnlock()">
        Unlock
      </button>
    </div>
  </div>

  <!-- ── PIN GATE SCRIPT ──────────────────────────── -->
  <!-- Runs immediately — before any app code         -->
  <script>
  (function() {
    var S = 'PWA_PIN_PLACEHOLDER';

    try {
      if (localStorage.getItem('tietiy_pin') === S) {
        var gate = document.getElementById('pin-gate');
        if (gate) gate.style.display = 'none';
        return;
      }
    } catch(e) {}

    document.addEventListener('DOMContentLoaded',
      function() {
        var inp = document.getElementById('pin-input');
        if (inp) setTimeout(function() {
          inp.focus();
        }, 100);
      }
    );

    window._pinUnlock = function() {
      var inp      = document.getElementById('pin-input');
      var err      = document.getElementById('pin-error');
      var remember = document.getElementById('pin-remember');
      var gate     = document.getElementById('pin-gate');
      if (!inp || !gate) return;

      if (inp.value === S) {
        if (remember && remember.checked) {
          try {
            localStorage.setItem('tietiy_pin', S);
          } catch(e) {}
        }
        gate.style.display = 'none';
        if (err) err.textContent = '';
      } else {
        if (err) err.textContent = 'Incorrect PIN';
        inp.value = '';
        inp.focus();
        var card = gate.querySelector('.pin-card');
        if (card) {
          card.style.transform = 'translateX(-8px)';
          setTimeout(function() {
            card.style.transform = 'translateX(8px)';
            setTimeout(function() {
              card.style.transform = 'translateX(0)';
            }, 80);
          }, 80);
        }
      }
    };
  })();
  </script>

  <!-- ── LOADING SCREEN ──────────────────────────── -->
  <div id="app-loader">
    <div class="logo">🎯 TIE TIY</div>
    <div class="spinner"></div>
    <div id="loader-msg">Loading scanner data...</div>
  </div>

  <!-- ── ERROR SCREEN ────────────────────────────── -->
  <div id="app-error">
    <div class="err-title">Scanner data unavailable</div>
    <div id="error-detail">Could not load scan data.</div>
    <div style="margin-top:12px;font-size:12px;">
      Last known scan: <span id="error-last-scan">—</span>
    </div>
    <button onclick="window.location.reload()"
      style="margin-top:16px;background:#21262d;
             color:#c9d1d9;border:1px solid #30363d;
             border-radius:6px;padding:8px 20px;
             font-size:13px;cursor:pointer;">
      Try Again
    </button>
  </div>

  <!-- ── MAIN APP ROOT ───────────────────────────── -->
  <div id="app-root">

    <!-- STATUS BAR — rendered by ui.js -->
    <div id="status-bar"></div>

    <!-- STOP ALERT BANNER — rendered by ui.js -->
    <div id="alert-banner"></div>

    <!-- MOBILE NEWS — phone/fold only              -->
    <!-- Hidden on iPad where left panel is used    -->
    <div id="mobile-news-section"
         style="display:none;">
    </div>

    <!-- TAB CONTENT — rendered by active tab JS -->
    <div id="tab-content"></div>

    <!-- BOTTOM NAV — rendered by ui.js -->
    <div id="bottom-nav"></div>

    <!-- TAP PANEL OVERLAY — rendered by app.js -->
    <div id="tap-overlay"
         style="display:none;position:fixed;
                top:0;left:0;right:0;bottom:0;
                background:rgba(0,0,0,0.75);
                z-index:100;">
    </div>

    <!-- TAP PANEL — rendered by app.js -->
    <div id="tap-panel"
         style="display:none;position:fixed;
                bottom:0;left:50%;
                transform:translateX(-50%)
                          translateY(100%);
                width:100%;max-width:600px;
                background:#0d1117;
                border-top:2px solid #30363d;
                border-radius:16px 16px 0 0;
                padding:16px 16px 32px;
                z-index:101;
                transition:transform 0.3s ease;">
    </div>

    <!-- HELP OVERLAY — rendered by ui.js -->
    <div id="help-overlay"
         style="display:none;position:fixed;
                top:0;left:0;right:0;bottom:0;
                background:#0d1117;
                z-index:200;
                overflow-y:auto;">
    </div>

  </div><!-- end app-root -->

  <!-- ── SIDEBAR — right panel iPad/large ───────── -->
  <div id="sidebar"
       style="display:none;position:fixed;
              top:0;overflow-y:auto;
              z-index:10;">
  </div>

  <!-- ── NEWS PANEL — left panel iPad >1000px ───── -->
  <div id="news-panel"
       style="display:none;position:fixed;
              top:0;overflow-y:auto;
              padding-bottom:80px;z-index:10;">
  </div>

  <!-- ── NEWS OVERLAY ────────────────────────────── -->
  <!-- Darkens screen when news drawer is open       -->
  <div id="news-overlay"
       style="display:none;position:fixed;
              top:0;left:0;right:0;bottom:0;
              background:rgba(0,0,0,0.85);
              z-index:400;"
       onclick="_closeNewsCard()">
  </div>

  <!-- ── NEWS DRAWER ─────────────────────────────── -->
  <!-- Slide-up panel for full headline + link       -->
  <div id="news-drawer"
       style="display:none;position:fixed;
              bottom:0;left:0;right:0;
              background:#0d1117;
              border-top:2px solid #30363d;
              border-radius:16px 16px 0 0;
              padding:20px 16px 48px;
              z-index:401;
              max-height:60vh;
              overflow-y:auto;">
  </div>

  <!-- ── SERVICE WORKER REGISTRATION ────────────── -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker
          .register('sw.js')
          .then(function(reg) {
            console.log('[SW] Registered:', reg.scope);
          })
          .catch(function(err) {
            console.log('[SW] Registration failed:', err);
          });
      });
    }
  </script>

  <!-- ── JS FILES ────────────────────────────────── -->
  <script src="ui.js?v=202604160200"></script>
  <script src="app.js?v=202604160200"></script>
  <script src="journal.js?v=202604160200"></script>
  <script src="stats.js?v=202604160200"></script>

</body>
</html>
