name: TIE TIY Fix Verifier

on:
  workflow_dispatch:
    inputs:
      ai_model:
        description: 'AI Model for Layer 2 audit'
        required: true
        default: 'haiku'
        type: choice
        options:
          - haiku
          - sonnet

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      AICREDITS_API_KEY: ${{ secrets.AICREDITS_API_KEY }}
      AI_MODEL: ${{ github.event.inputs.ai_model }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Run Fix Verifier
        run: PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/scanner python scanner/verify_fixes.py
