# .github/workflows/heartbeat.yml
# Purpose: Daily alive ping confirming system is running
#          Sends regime + active count + last scan to Telegram
# Trigger: GitHub schedule — 8:30 AM IST Mon-Fri
# Sequence: First daily check, before morning scan
# Touches: Telegram only (no file writes)
# Failure mode: Telegram alert via alert_failure.py
#
# Architecture v2 (Apr 22 2026):
# - Confirmed GitHub schedule (drift-tolerant up to 15 min)
# - Removed cron-job.org dual-trigger ambiguity
# - 8:30 AM IST runs before morning_scan @ 8:45 IST

name: "💓 Heartbeat | Daily alive ping regime+active+lastScan Telegram | 8:30 AM IST Daily"

on:
  schedule:
    # 3:00 AM UTC = 8:30 AM IST Mon-Fri
    - cron: '0 3 * * 1-5'
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Pull latest output files
        run: |
          git fetch origin
          git checkout origin/main -- output/ || true

      - name: Send Heartbeat
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:         ${{ secrets.GH_TOKEN }}
          GH_REPO:          ${{ github.repository }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: python scanner/heartbeat.py

      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_NAME:    "Heartbeat"
          RUN_URL:          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          pip install requests --quiet
          python scanner/alert_failure.py
