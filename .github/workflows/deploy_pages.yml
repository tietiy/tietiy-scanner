# .github/workflows/deploy.yml
# Deploys output/ to tietiy.in via GitHub Pages
# Injects PWA PIN from GitHub secret before upload
# Triggered on any push to output/

name: "🚀 Deploy | PIN-inject+output to tietiy.in GitHub Pages | On Push Auto"

on:
  push:
    paths:
      - 'output/**'
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      pages:    write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Inject PWA PIN
        env:
          PWA_PIN: ${{ secrets.PWA_PIN }}
        run: |
          sed -i "s/PWA_PIN_PLACEHOLDER/${PWA_PIN}/g" \
            output/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
