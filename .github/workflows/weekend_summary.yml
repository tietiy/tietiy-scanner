# .github/workflows/weekend_summary.yml
# Purpose: Weekly Saturday recap to Telegram
#          W/L/F counts, win rate, signal type breakdown, phase progress
# Trigger: GitHub schedule — Saturday 9:00 AM IST
# Sequence: Standalone weekend reflection report
# Touches: Telegram only (no file writes)
# Failure mode: Telegram alert via send_workflow_failure
#
# Architecture v2 (Apr 22 2026):
# - GitHub schedule (drift-tolerant, weekly)
# - Saturday 9:00 AM IST after backup_manager (8:30 AM)
# - Read-only — pulls latest output/ before generating

name: "📅 Weekend Summary | W/L/F WR type-counts phase-progress Telegram | Sat 9:00 AM IST"

on:
  schedule:
    # Saturday 3:30 AM UTC = 9:00 AM IST
    - cron: '30 3 * * 6'
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Pull latest output files
        run: |
          git fetch origin
          git checkout origin/main -- output/ || true

      - name: Run Weekend Summary
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: python scanner/weekend_summary.py

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          python -c "
          import sys; sys.path.insert(0, 'scanner')
          from telegram_bot import send_workflow_failure
          send_workflow_failure('weekend_summary', '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
