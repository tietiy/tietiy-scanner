name: Heal Signal Data (One-Time)

on:
  workflow_dispatch:
    inputs:
      heal_sa:
        description: 'C1 — Reset 2 invalid SA signals (ADANIGREEN + BSE Apr 8)'
        required: false
        default: false
        type: boolean
      heal_rejected_report:
        description: 'C2 — Report only: investigate 43 rejected signals'
        required: false
        default: false
        type: boolean
      heal_rejected_fix:
        description: 'C2 — Apply fix: convert gen=1 rejected to TOOK (run report first)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  heal:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Create folders
        run: mkdir -p output data output/backups

      - name: C1 — Heal SA signals (dry run first)
        if: ${{ inputs.heal_sa == true }}
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "=== C1 DRY RUN ==="
          python scanner/heal_sa_signals.py --dry-run

      - name: C1 — Heal SA signals (apply)
        if: ${{ inputs.heal_sa == true }}
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "=== C1 APPLYING FIX ==="
          python scanner/heal_sa_signals.py

      - name: C2 — Rejected signals report
        if: ${{ inputs.heal_rejected_report == true || inputs.heal_rejected_fix == true }}
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "=== C2 INVESTIGATION REPORT ==="
          python scanner/heal_rejected_signals.py --report

      - name: C2 — Rejected signals fix (gen=1 only)
        if: ${{ inputs.heal_rejected_fix == true }}
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "=== C2 APPLYING FIX ==="
          python scanner/heal_rejected_signals.py --fix

      - name: Commit and push healed data
        if: ${{ inputs.heal_sa == true || inputs.heal_rejected_fix == true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add \
            output/signal_history.json \
            output/signal_history.backup.json \
            output/backups/ \
            2>/dev/null || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Data heal $(date '+%Y-%m-%d') — C1/C2 fix"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_NAME: "Heal Signal Data"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          pip install requests --quiet
          python scanner/alert_failure.py
