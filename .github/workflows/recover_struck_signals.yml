name: Recover Stuck Signals

# Manual-dispatch only — run once to resolve
# signals stuck in PENDING due to yfinance failure
# in outcome_evaluator.py. Reads eod_prices.json
# as source of truth. See scanner/recover_stuck_signals.py

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm recovery run'
        required: true
        default: 'NO'

permissions:
  contents: write

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Guard — confirm input
        if: ${{ github.event.inputs.confirm != 'YES' }}
        run: |
          echo "Aborting — confirm input was not YES"
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas yfinance

      - name: Show pre-run state
        run: |
          echo "=== Pre-run file state ==="
          ls -la output/signal_history.json
          ls -la output/eod_prices.json
          echo "=== History head ==="
          python -c "import json; d=json.load(open('output/signal_history.json')); h=d.get('history',[]); p=[s for s in h if s.get('result')=='PENDING' and s.get('outcome') in (None,'OPEN') and s.get('entry_valid') is not False]; print(f'Total records: {len(h)}'); print(f'PENDING open signals: {len(p)}')"

      - name: Run recovery
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd $GITHUB_WORKSPACE
          python scanner/recover_stuck_signals.py

      - name: Show post-run state
        run: |
          echo "=== Post-run file state ==="
          ls -la output/signal_history.json
          echo "=== History summary ==="
          python -c "import json; d=json.load(open('output/signal_history.json')); h=d.get('history',[]); p=[s for s in h if s.get('result')=='PENDING' and s.get('outcome') in (None,'OPEN') and s.get('entry_valid') is not False]; r=[s for s in h if s.get('data_quality')=='recovery_close_fallback']; print(f'Total records: {len(h)}'); print(f'PENDING open signals remaining: {len(p)}'); print(f'Recovered (close_fallback flag): {len(r)}')"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/signal_history.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "recover: resolve stuck signals from eod_prices.json"
            git push
          fi
