# .github/workflows/eod_master.yml
# EOD Master — single chained workflow for end-of-day.
# Replaces old eod_update.yml + absorbs chain_validator
# and pattern_miner runs.
#
# Runs at 3:35 PM IST via cron-job.org (same trigger time
# as old eod_update.yml, so no cron-job.org change needed).
#
# STEPS IN ORDER:
#   1. Backup manager (preserve history)
#   2. Outcome evaluation (resolve signals)
#   3. EOD prices fetch (write eod_prices.json)
#   4. Telegram EOD summary (main.py eod mode)
#   5. CRIT-03: Validate eod_prices.json freshness ← NEW
#   6. Chain validator (writes system_health.json)
#   7. Pattern miner (writes patterns.json)
#   8. Rule proposer (writes proposed_rules.json)
#   9. Commit all output/ changes
#
# DESIGN:
# - Critical steps (1-5) use exit-on-error: stop if broken
# - Aux steps (6-8) use continue-on-error: never block commit
# - Single commit at end: atomic update for PWA
#
# CRIT-03 FIX (Apr 21 2026 night):
# Added validation step after EOD chain to catch silent
# failures. Previously, "No changes to commit" hid the
# fact that eod_prices.json was stale (4 days old). Now:
#   - Validates eod_prices.json exists
#   - Validates schema_version >= 2 (CRIT-01 schema)
#   - Validates ohlc_by_symbol has data (>= 50 symbols)
#   - Validates date matches today
#   - Fails loudly with Telegram alert if any check fails
#
# ROLLBACK: If this breaks, rename to eod_master.yml.bak
# and rename eod_update.yml.bak back to eod_update.yml.

name: "🌙 EOD Master | Backup+Outcomes+EOD+Validate+Chain+Patterns+Proposals+Telegram | 3:35 PM IST"

on:
  workflow_dispatch:
    inputs:
      skip_patterns:
        description: 'Skip pattern miner (for debug)'
        required: false
        default: false
        type: boolean
      skip_proposals:
        description: 'Skip rule proposer (for debug)'
        required: false
        default: false
        type: boolean
      skip_validation:
        description: 'Skip eod_prices validation (CRIT-03 emergency override)'
        required: false
        default: false
        type: boolean

concurrency:
  group: tietiy-eod-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  eod_master:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Create folders
        run: mkdir -p output data output/backups

      # ── STEP 1: Backup (critical) ─────────────────
      - name: "1/8 Backup manager"
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 1/8: BACKUP"
          echo "════════════════════════════════════════"
          python scanner/backup_manager.py

      # ── STEP 2-4: Outcome eval + EOD + Telegram ───
      - name: "2-4/8 EOD chain (main.py eod)"
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:         ${{ secrets.GH_TOKEN }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  STEPS 2-4/8: OUTCOMES + EOD + TELEGRAM"
          echo "════════════════════════════════════════"
          cd $GITHUB_WORKSPACE/scanner
          python main.py eod

      # ── STEP 5: CRIT-03 EOD prices validation ─────
      # Validates that eod_prices.json was actually
      # updated correctly. Catches silent failures
      # like the 4-day stale file issue from Apr 17-21.
      #
      # Validation criteria:
      #   1. File exists at output/eod_prices.json
      #   2. schema_version >= 2 (CRIT-01 schema)
      #   3. date field matches today (IST)
      #   4. ohlc_by_symbol has at least 50 symbols
      #      (we have 119 open positions, expect 100+)
      #
      # Fails workflow loudly if any check fails.
      # Sends Telegram alert with details.
      # Can be bypassed via skip_validation input
      # for emergency manual runs.
      - name: "5/8 Validate eod_prices.json (CRIT-03)"
        if: ${{ inputs.skip_validation != true }}
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 5/8: VALIDATE EOD_PRICES.JSON"
          echo "════════════════════════════════════════"

          python <<'PYEOF'
          import json
          import os
          import sys
          import requests
          from datetime import datetime, timezone, timedelta

          MIN_SYMBOLS = 50
          EXPECTED_SCHEMA = 2
          FILE_PATH = "output/eod_prices.json"

          # IST today
          ist = timezone(timedelta(hours=5, minutes=30))
          today_ist = datetime.now(tz=ist).date().isoformat()

          errors = []
          warnings = []

          # Check 1: File exists
          if not os.path.exists(FILE_PATH):
              errors.append(f"FILE MISSING: {FILE_PATH}")
          else:
              size_kb = os.path.getsize(FILE_PATH) / 1024
              print(f"[validate] File exists: {size_kb:.1f} KB")

              try:
                  with open(FILE_PATH, 'r') as f:
                      data = json.load(f)
              except Exception as e:
                  errors.append(f"PARSE ERROR: {e}")
                  data = None

              if data:
                  # Check 2: Schema version
                  schema_v = data.get('schema_version', 1)
                  print(f"[validate] schema_version: {schema_v}")
                  if schema_v < EXPECTED_SCHEMA:
                      errors.append(
                          f"OLD SCHEMA: v{schema_v} "
                          f"(expected v{EXPECTED_SCHEMA}+)")

                  # Check 3: Date matches today
                  file_date = data.get('date', 'MISSING')
                  print(f"[validate] file date: {file_date}")
                  print(f"[validate] today (IST): {today_ist}")
                  if file_date != today_ist:
                      errors.append(
                          f"STALE DATE: file={file_date} "
                          f"today={today_ist}")

                  # Check 4: ohlc_by_symbol size
                  ohlc = data.get('ohlc_by_symbol', {})
                  ohlc_count = len(ohlc) if isinstance(ohlc, dict) else 0
                  print(f"[validate] ohlc_by_symbol: {ohlc_count} symbols")
                  if ohlc_count < MIN_SYMBOLS:
                      errors.append(
                          f"INSUFFICIENT OHLC: {ohlc_count} symbols "
                          f"(expected >= {MIN_SYMBOLS})")

                  # Check 5: results[] also present (warning only)
                  results = data.get('results', [])
                  results_count = len(results) if isinstance(results, list) else 0
                  print(f"[validate] results[]: {results_count} entries")
                  if results_count == 0:
                      warnings.append(
                          "results[] empty — telegram/stop_check "
                          "may show stale data")

                  # Check 6: open_positions field
                  open_pos = data.get('open_positions', 0)
                  print(f"[validate] open_positions: {open_pos}")

          # Report
          print("\n" + "=" * 50)
          print("VALIDATION REPORT")
          print("=" * 50)

          if warnings:
              print("\nWARNINGS:")
              for w in warnings:
                  print(f"  ⚠ {w}")

          if errors:
              print("\nERRORS:")
              for e in errors:
                  print(f"  ✗ {e}")

              # Send Telegram alert
              token = os.getenv('TELEGRAM_TOKEN', '')
              chat  = os.getenv('TELEGRAM_CHAT_ID', '')

              if token and chat:
                  msg = (
                      "🚨 EOD VALIDATION FAILED\n\n"
                      "eod_prices.json failed CRIT-03 checks:\n\n"
                      + "\n".join(f"• {e}" for e in errors)
                      + "\n\n"
                      "Outcome resolution will be degraded.\n"
                      "Check workflow logs immediately."
                  )
                  try:
                      r = requests.post(
                          f"https://api.telegram.org/"
                          f"bot{token}/sendMessage",
                          data={"chat_id": chat, "text": msg},
                          timeout=10)
                      if r.status_code == 200:
                          print("\n[validate] Telegram alert sent")
                      else:
                          print(f"\n[validate] Telegram failed: "
                                f"{r.status_code}")
                  except Exception as e:
                      print(f"\n[validate] Telegram error: {e}")

              print("\n" + "=" * 50)
              print("EXITING WITH FAILURE — eod_prices invalid")
              print("=" * 50)
              sys.exit(1)
          else:
              print("\n✓ All validation checks PASSED")

          PYEOF

      # ── STEP 6: Chain validator (non-critical) ────
      - name: "6/8 Chain validator"
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 6/8: CHAIN VALIDATOR"
          echo "════════════════════════════════════════"
          cd $GITHUB_WORKSPACE/scanner
          python chain_validator.py

      # ── STEP 7: Pattern miner (non-critical) ──────
      - name: "7/8 Pattern miner"
        if: ${{ inputs.skip_patterns != true }}
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 7/8: PATTERN MINER"
          echo "════════════════════════════════════════"
          cd $GITHUB_WORKSPACE/scanner
          python pattern_miner.py

      # ── STEP 8: Rule proposer (non-critical) ──────
      - name: "8/8 Rule proposer"
        if: ${{ inputs.skip_proposals != true }}
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 8/8: RULE PROPOSER"
          echo "════════════════════════════════════════"
          cd $GITHUB_WORKSPACE/scanner
          python rule_proposer.py

      # ── COMMIT (single atomic update) ──────────────
      - name: Commit and push all outputs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "════════════════════════════════════════"
          echo "  COMMITTING ALL CHANGES"
          echo "════════════════════════════════════════"
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"

          git add \
            output/eod_prices.json \
            output/signal_history.json \
            output/signal_history.backup.json \
            output/signal_archive.json \
            output/colab_export.json \
            output/meta.json \
            output/tg_offset.json \
            output/system_health.json \
            output/patterns.json \
            output/proposed_rules.json \
            output/contra_shadow.json \
            output/regime_debug.json \
            output/backups/ \
            backups/ \
            2>/dev/null || true

          git diff --cached --quiet && \
            echo "No changes to commit" && exit 0

          git commit -m "EOD master $(date '+%Y-%m-%d') IST — backup+outcomes+eod+validate+chain+patterns+proposals"

          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      # ── FAILURE ALERT ─────────────────────────────
      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_NAME:    "EOD Master"
          RUN_URL:          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          pip install requests --quiet
          python scanner/alert_failure.py
