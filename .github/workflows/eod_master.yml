# .github/workflows/eod_master.yml
# Purpose: EOD Master — single chained workflow for end-of-day
#          Replaces old eod_update.yml + absorbs chain_validator,
#          pattern_miner, rule_proposer runs into one atomic update
# Trigger: cron-job.org @ 3:35 PM IST Mon-Fri (workflow_dispatch)
# Sequence: 5 min after market close (3:30 PM IST)
# Touches: ALL output/*.json files (atomic single commit)
# Failure mode: Telegram alert via alert_failure.py
#
# Architecture v2 (Apr 22 2026):
# - cron-job.org triggered (precision-critical, post-market)
# - workflow_dispatch only (no GitHub schedule)
# - CRIT-03 validation step (5/8) catches schema mismatch + nan-data
# - skip_validation input for emergency manual override
#
# STEPS IN ORDER:
#   1. Backup manager (preserve history)
#   2-4. EOD chain via main.py eod (outcomes + EOD prices + Telegram)
#   5. EOD VALIDATION (CRIT-03) — verify eod_prices.json valid
#   6. Chain validator (writes system_health.json)
#   7. Pattern miner (writes patterns.json)
#   8. Rule proposer (writes proposed_rules.json)
#   COMMIT: Single atomic update for PWA
#
# DESIGN:
# - Critical steps (1-5) use exit-on-error: stop if broken
# - Aux steps (6-8) use continue-on-error: never block commit
# - Single commit at end: atomic update for PWA
#
# ROLLBACK: Old eod_update.yml.bak preserved as escape hatch

name: "🌙 EOD Master | Backup+Outcomes+EOD+Validate+Chain+Patterns+Proposals+Telegram | 3:35 PM IST cron-job.org"

on:
  workflow_dispatch:
    inputs:
      skip_patterns:
        description: 'Skip pattern miner (for debug)'
        required: false
        default: false
        type: boolean
      skip_proposals:
        description: 'Skip rule proposer (for debug)'
        required: false
        default: false
        type: boolean
      skip_validation:
        description: 'EMERGENCY: Skip CRIT-03 validation (for debug only)'
        required: false
        default: false
        type: boolean

concurrency:
  group: tietiy-eod-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  eod_master:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Create folders
        run: mkdir -p output data output/backups

      # ── STEP 1: Backup (critical) ─────────────────
      - name: "1/8 Backup manager"
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 1/8: BACKUP"
          echo "════════════════════════════════════════"
          python scanner/backup_manager.py

      # ── STEP 2-4: Outcome eval + EOD + Telegram ───
      - name: "2-4/8 EOD chain (main.py eod)"
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:         ${{ secrets.GH_TOKEN }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  STEPS 2-4/8: OUTCOMES + EOD + TELEGRAM"
          echo "════════════════════════════════════════"
          cd $GITHUB_WORKSPACE/scanner
          python main.py eod

      # ── STEP 5: EOD VALIDATION (CRIT-03) ──────────
      # Validates eod_prices.json before allowing commit.
      # Catches: schema_version<2, date mismatch, insufficient OHLC.
      # Sends Telegram alert on failure and exits 1.
      - name: "5/8 EOD validation (CRIT-03)"
        if: ${{ inputs.skip_validation != true }}
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 5/8: EOD VALIDATION (CRIT-03)"
          echo "════════════════════════════════════════"
          python -c "
          import json
          import sys
          from datetime import datetime, timezone, timedelta
          
          IST = timezone(timedelta(hours=5, minutes=30))
          today_ist = datetime.now(IST).date().isoformat()
          
          try:
              with open('output/eod_prices.json') as f:
                  data = json.load(f)
          except Exception as e:
              print(f'❌ Cannot load eod_prices.json: {e}')
              sys.exit(1)
          
          schema_version = data.get('schema_version', 1)
          eod_date = data.get('date', '')
          ohlc_by_symbol = data.get('ohlc_by_symbol', {})
          symbol_count = len(ohlc_by_symbol)
          
          print(f'Schema version: {schema_version}')
          print(f'EOD date: {eod_date} (today IST: {today_ist})')
          print(f'OHLC symbol count: {symbol_count}')
          
          errors = []
          if schema_version < 2:
              errors.append(f'schema_version={schema_version} (expected ≥2 — CRIT-01 not applied)')
          if eod_date != today_ist:
              errors.append(f'date mismatch: file={eod_date} vs today_ist={today_ist}')
          if symbol_count < 50:
              errors.append(f'INSUFFICIENT OHLC: {symbol_count} symbols (expected ≥50)')
          
          if errors:
              print('')
              print('❌ EOD VALIDATION FAILED:')
              for e in errors:
                  print(f'   - {e}')
              
              try:
                  sys.path.insert(0, 'scanner')
                  from telegram_bot import send_message
                  msg = '🚨 EOD MASTER VALIDATION FAILED\\n\\n' + '\\n'.join(f'• {e}' for e in errors) + '\\n\\nManual investigation required.'
                  send_message(msg)
              except Exception as te:
                  print(f'Telegram alert failed: {te}')
              
              sys.exit(1)
          
          print('')
          print('✅ EOD validation passed')
          "

      # ── STEP 6: Pattern miner (non-critical) ──────
      # M-12 RESOLVED 2026-04-29: pattern_miner moved BEFORE chain_validator
      # so chain_validator (step 8) reads pattern_miner's fresh generated_at.
      # Prior ordering: chain_validator step 6 → pattern_miner step 7 →
      # rule_proposer step 8 produced false-DEGRADED warnings (chain_validator
      # read yesterday's generated_at before pattern_miner wrote today's).
      # See fix_table M-12 + project_anchor §7 D-3 + this commit message.
      - name: "6/8 Pattern miner"
        if: ${{ inputs.skip_patterns != true }}
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 6/8: PATTERN MINER"
          echo "════════════════════════════════════════"
          cd $GITHUB_WORKSPACE/scanner
          python pattern_miner.py

      # ── STEP 7: Rule proposer (non-critical) ──────
      - name: "7/8 Rule proposer"
        if: ${{ inputs.skip_proposals != true }}
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 7/8: RULE PROPOSER"
          echo "════════════════════════════════════════"
          cd $GITHUB_WORKSPACE/scanner
          python rule_proposer.py

      # ── STEP 8: Chain validator (non-critical) ────
      # Runs LAST so it reads fresh generated_at from pattern_miner (step 6)
      # + rule_proposer (step 7). M-12 fix per fix_table + project_anchor §7 D-3.
      - name: "8/8 Chain validator"
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 8/8: CHAIN VALIDATOR (post-mining; M-12 fix)"
          echo "════════════════════════════════════════"
          cd $GITHUB_WORKSPACE/scanner
          python chain_validator.py

      # ── COMMIT (single atomic update) ──────────────
      - name: Commit and push all outputs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "════════════════════════════════════════"
          echo "  COMMITTING ALL CHANGES"
          echo "════════════════════════════════════════"
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"

          git add \
            output/eod_prices.json \
            output/signal_history.json \
            output/signal_history.backup.json \
            output/signal_archive.json \
            output/colab_export.json \
            output/meta.json \
            output/tg_offset.json \
            output/system_health.json \
            output/patterns.json \
            output/proposed_rules.json \
            output/contra_shadow.json \
            output/regime_debug.json \
            output/backups/ \
            backups/ \
            2>/dev/null || true

          git diff --cached --quiet && \
            echo "No changes to commit" && exit 0

          git commit -m "EOD master $(date '+%Y-%m-%d') IST — backup+outcomes+eod+validate+chain+patterns+proposals"

          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      # ── FAILURE ALERT ─────────────────────────────
      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_NAME:    "EOD Master"
          RUN_URL:          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          pip install requests --quiet
          python scanner/alert_failure.py
