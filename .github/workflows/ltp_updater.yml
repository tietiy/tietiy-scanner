# .github/workflows/ltp_updater.yml
# Purpose: Fetch intraday LTP for all PENDING signals
#          Holiday guard — skips on NSE holidays/weekends
# Trigger: cron-job.org every 5 min during market hours
#          (9:30 AM - 3:30 PM IST = 4:00 - 10:00 UTC)
# Sequence: Runs 76 times per trading day (every 5 min)
# Touches: output/ltp_prices.json
# Failure mode: Telegram alert via send_workflow_failure
#
# Architecture v2 (Apr 22 2026):
# - cron-job.org triggered (precision-critical, 5-min cadence)
# - workflow_dispatch only (no GitHub schedule)
# - concurrency: cancel-in-progress true
#   (latest LTP request wins — old requests can be cancelled safely)
# - cron-job.org expression: */5 4-10 * * 1-5
#
# LW1 fix preserved (v2):
# - Excludes terminal outcome signals from pending list
# - Holiday/weekend guard inside ltp_writer.py

name: "💹 LTP Updater | Intraday price PENDING signals holiday-guard | Every 5Min cron-job.org"

on:
  workflow_dispatch:

concurrency:
  group: ltp-update
  cancel-in-progress: true

jobs:
  update_ltp:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Pull latest output files
        run: |
          git fetch origin
          git checkout origin/main -- output/ || true

      - name: Run LTP updater
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: python scanner/ltp_writer.py

      - name: Commit ltp_prices.json
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add output/ltp_prices.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          IST=$(date -u -d '+5 hours 30 minutes' \
            '+%H:%M IST' 2>/dev/null || \
            date -u '+%H:%M IST')
          git commit -m "LTP update ${IST}"
          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          python -c "
          import sys; sys.path.insert(0, 'scanner')
          from telegram_bot import send_workflow_failure
          send_workflow_failure('ltp_updater', '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
