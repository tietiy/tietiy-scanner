# .github/workflows/wave2.yml
# Purpose: Run scripts/wave2_migration.py with manual
#          trigger. Two modes:
#
#          dry_run  — analyze + print plan, no file writes.
#                     Safe to run any time.
#
#          execute  — apply migration with full safety:
#                     backup → apply → syntax check →
#                     commit (only if all pass). Auto
#                     rollback on any syntax failure.
#
# Workflow ALWAYS uses workflow_dispatch (manual only).
# No schedule — this is a one-shot migration.
#
# When TO run:
#   - After Wave 1 calendar_utils.py is committed
#   - NOT during market hours (9:15 AM – 3:30 PM IST)
#
# Wave 2 kills fix-table items H-03, H-09, M-06.

name: "🔧 Wave 2 Migration | IST helpers consolidation | Manual"

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'dry_run'
        type: choice
        options:
          - dry_run
          - execute

jobs:
  wave2:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show mode
        run: |
          echo "═══════════════════════════════════════════"
          echo "WAVE 2 MIGRATION — mode: ${{ inputs.mode }}"
          echo "═══════════════════════════════════════════"

      - name: Run migration script
        id: migrate
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          if [ "${{ inputs.mode }}" = "dry_run" ]; then
            python scripts/wave2_migration.py --dry-run --json
          else
            python scripts/wave2_migration.py --execute --json
          fi

      - name: Commit changes (execute mode only)
        if: inputs.mode == 'execute' && success()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"

          git add scanner/ doc/ quarantine/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit — migration was a no-op"
            exit 0
          fi

          COMMIT_MSG="Wave 2: Migrate to calendar_utils helpers (H-03, H-09, M-06)

          Automated migration via scripts/wave2_migration.py:
          - date.today() → ist_today() everywhere
          - Local _ist_today/_now_ist_str/_is_trading_day → canonical
          - Added from calendar_utils import ... where needed
          - Full backup in quarantine/wave2_<timestamp>/
          - Audit log in doc/wave2_migration_log_<timestamp>.md"

          git commit -m "$COMMIT_MSG"

          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && \
            break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      - name: Upload plan as artifact (dry_run only)
        if: inputs.mode == 'dry_run'
        uses: actions/upload-artifact@v4
        with:
          name: wave2-dry-run-plan
          path: |
            doc/wave2_migration_log_*.md
          if-no-files-found: ignore

      - name: Telegram notification
        if: always()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MODE="${{ inputs.mode }}"
          OUTCOME="${{ steps.migrate.outcome }}"

          if [ "$OUTCOME" = "success" ]; then
            if [ "$MODE" = "dry_run" ]; then
              MSG="🔍 Wave 2 DRY RUN complete%0A%0ACheck artifact for planned changes.%0AIf approved, re-run workflow with mode=execute."
            else
              MSG="✅ Wave 2 EXECUTE complete%0A%0AIST helpers consolidated.%0AH-03, H-09, M-06 killed.%0ARun Master Check to confirm green."
            fi
          else
            MSG="❌ Wave 2 ${MODE} FAILED%0A%0ACheck Actions logs.%0AIf execute mode: files rolled back automatically.%0ABackup preserved in quarantine/."
          fi

          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" || true
