# .github/workflows/weekly_intelligence.yml
# Purpose: Sunday weekly AI intelligence report
#          - Generates AI analysis of patterns, proposals, contra, regime
#          - Sends Telegram intelligence report
#          - Writes output/weekly_intelligence_latest.json
# Trigger: GitHub schedule — Sunday 8:00 PM IST
# Sequence: Standalone weekly system reflection
# Touches: output/weekly_intelligence_latest.json + Telegram
# Failure mode: Telegram alert via alert_failure.py
#
# Architecture v2 (Apr 22 2026):
# - SWITCHED from cron-job.org to GitHub schedule
# - GitHub schedule (drift-tolerant, weekly only)
# - Sunday 8:00 PM IST allows post-week reflection
# - DISABLE corresponding cron-job.org job to avoid double trigger
#
# Differs from weekend_summary.yml (Saturday):
# - weekend_summary = trader's recap "how did I do"
# - weekly_intelligence = system's analysis "what should change"

name: "🧠 Weekly Intelligence | Patterns+Proposals+Regime+Contra+Health Telegram | Sun 8 PM IST"

on:
  schedule:
    # Sunday 14:30 UTC = 8:00 PM IST
    - cron: '30 14 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip Telegram send (for testing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

concurrency:
  group: weekly_intelligence
  cancel-in-progress: false

jobs:
  weekly_intelligence:
    name: 🧠 Generate Weekly Intelligence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas yfinance

      - name: Create folders
        run: mkdir -p output

      - name: Pull latest output files
        run: |
          git fetch origin
          git checkout origin/main -- output/ || true

      - name: 🧠 Generate weekly intelligence
        id: generate
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN:           ${{ github.event.inputs.dry_run || 'false' }}
          PYTHONPATH:        ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  WEEKLY INTELLIGENCE GENERATION"
          echo "════════════════════════════════════════"
          echo "Dry run: $DRY_RUN"
          echo ""

          cd scanner

          if [ "$DRY_RUN" = "true" ]; then
            echo "[dry-run] Generating report without Telegram send"
            python weekly_intelligence.py
          else
            echo "[live] Generating and sending Telegram intelligence"
            python weekly_intelligence.py --send
          fi

          echo ""
          echo "════════════════════════════════════════"
          echo "  GENERATION COMPLETE"
          echo "════════════════════════════════════════"

      - name: 📋 Show output snapshot
        if: always()
        run: |
          if [ -f output/weekly_intelligence_latest.json ]; then
            echo "📄 weekly_intelligence_latest.json created:"
            echo "────────────────────────────────────────"
            head -c 500 output/weekly_intelligence_latest.json
            echo ""
            echo "────────────────────────────────────────"
            ls -lh output/weekly_intelligence_latest.json
          else
            echo "⚠️ weekly_intelligence_latest.json NOT found"
          fi

      - name: 💾 Commit weekly intelligence JSON
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"

          git add output/weekly_intelligence_latest.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: weekly intelligence report $TIMESTAMP [skip ci]"

            for i in 1 2 3; do
              git pull --rebase origin main && \
              git push origin HEAD:main && \
              echo "Push succeeded on attempt $i" && break
              echo "Push attempt $i failed, retrying in 10s..."
              sleep 10
            done
          fi

      - name: 🚨 Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_NAME:     "Weekly Intelligence"
          RUN_URL:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PYTHONPATH:        ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          pip install requests --quiet
          python scanner/alert_failure.py
