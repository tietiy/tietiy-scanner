name: "🧠 Weekly Intelligence | Sun 8 PM IST"

# ─────────────────────────────────────────────────
# Purpose: Run weekly_intelligence.py every Sunday
#   - Generates AI analysis of patterns, proposals,
#     contra, regime
#   - Sends Telegram intelligence report
#   - Writes output/weekly_intelligence_latest.json
#
# Trigger: workflow_dispatch only (cron-job.org)
# Schedule: Sunday 8 PM IST = 14:30 UTC
#
# Uses TELEGRAM_TOKEN/TELEGRAM_CHAT_ID to match
# existing telegram_bot.py env var expectations.
# ─────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip Telegram send (for testing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

concurrency:
  group: weekly_intelligence
  cancel-in-progress: false

jobs:
  weekly_intelligence:
    name: 🧠 Generate Weekly Intelligence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ─────────────────────────────────────────────
      # Step 1: Checkout
      # ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      # ─────────────────────────────────────────────
      # Step 2: Python setup (NO pip cache — matches
      # pattern from other working workflows)
      # ─────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─────────────────────────────────────────────
      # Step 3: Install dependencies
      # ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install requests pandas yfinance

      # ─────────────────────────────────────────────
      # Step 4: Ensure output directory exists
      # ─────────────────────────────────────────────
      - name: Create folders
        run: mkdir -p output

      # ─────────────────────────────────────────────
      # Step 5: Generate weekly intelligence
      # Uses TELEGRAM_TOKEN / TELEGRAM_CHAT_ID to
      # match telegram_bot.py env var expectations.
      # ─────────────────────────────────────────────
      - name: 🧠 Generate weekly intelligence
        id: generate
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN:           ${{ github.event.inputs.dry_run }}
          PYTHONPATH:        ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          echo "════════════════════════════════════════"
          echo "  WEEKLY INTELLIGENCE GENERATION"
          echo "════════════════════════════════════════"
          echo "Dry run: $DRY_RUN"
          echo ""

          cd scanner

          if [ "$DRY_RUN" = "true" ]; then
            echo "[dry-run] Generating report without Telegram send"
            python weekly_intelligence.py
          else
            echo "[live] Generating and sending Telegram intelligence"
            python weekly_intelligence.py --send
          fi

          echo ""
          echo "════════════════════════════════════════"
          echo "  GENERATION COMPLETE"
          echo "════════════════════════════════════════"

      # ─────────────────────────────────────────────
      # Step 6: Show output snapshot (for logs)
      # ─────────────────────────────────────────────
      - name: 📋 Show output snapshot
        if: always()
        run: |
          if [ -f output/weekly_intelligence_latest.json ]; then
            echo "📄 weekly_intelligence_latest.json created:"
            echo "────────────────────────────────────────"
            head -c 500 output/weekly_intelligence_latest.json
            echo ""
            echo "────────────────────────────────────────"
            ls -lh output/weekly_intelligence_latest.json
          else
            echo "⚠️ weekly_intelligence_latest.json NOT found"
          fi

      # ─────────────────────────────────────────────
      # Step 7: Commit the output JSON
      # ─────────────────────────────────────────────
      - name: 💾 Commit weekly intelligence JSON
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"

          git add output/weekly_intelligence_latest.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: weekly intelligence report $TIMESTAMP [skip ci]"

            for i in 1 2 3; do
              git pull --rebase origin main && \
              git push origin HEAD:main && \
              echo "Push succeeded on attempt $i" && break
              echo "Push attempt $i failed, retrying in 10s..."
              sleep 10
            done
          fi

      # ─────────────────────────────────────────────
      # Step 8: Failure notification
      # ─────────────────────────────────────────────
      - name: 🚨 Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_NAME:     "Weekly Intelligence"
          RUN_URL:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PYTHONPATH:        ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          pip install requests --quiet
          python scanner/alert_failure.py
