# .github/workflows/premarket.yml
# Purpose: Bridge L1 PRE_MARKET composer
#          Reads truth files, runs queries, builds SDRs,
#          writes bridge_state.json + sends Telegram brief
# Trigger: cron-job.org @ 8:55 AM IST Mon-Fri (workflow_dispatch)
# Sequence: 10 min after morning_scan (8:45 AM)
# Touches: output/bridge_state.json + output/bridge_state_history/
# Failure mode: Telegram alert via send_workflow_failure
#
# Architecture v2 (2026-04-27):
# - cron-job.org triggered (precision-critical, pre-market)
# - workflow_dispatch only (no GitHub schedule)
# - Atomic single commit (bridge_state.json + dated history file)
# - Reads upstream signal_history.json from prior morning_scan commit
# - Telegram brief via bridge_telegram_premarket.py
#   (continue-on-error: brief is supplementary, not critical)

name: "🌉 Bridge Pre-market | Compose+SDR+Telegram brief | 8:55 AM IST cron-job.org"

on:
  workflow_dispatch:

concurrency:
  group: bridge-premarket
  cancel-in-progress: false

jobs:
  bridge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bridge L1 compose
        id: compose
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner/bridge/bridge.py --phase PRE_MARKET

      - name: Send Telegram pre-market brief
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner/bridge_telegram_premarket.py --state-file output/bridge_state.json

      - name: Commit and push bridge_state
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add output/bridge_state.json output/bridge_state_history/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No bridge_state changes to commit"
            exit 0
          fi
          COMPOSE_RESULT="${{ steps.compose.outcome }}"
          if [ "$COMPOSE_RESULT" = "failure" ]; then
            COMMIT_MSG="Bridge premarket FAILED $(date '+%Y-%m-%d %H:%M IST') — partial state"
          else
            COMMIT_MSG="Bridge premarket $(date '+%Y-%m-%d %H:%M IST')"
          fi
          git commit -m "$COMMIT_MSG"
          PUSHED=0
          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            PUSHED=1 && \
            echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done
          if [ "$PUSHED" -eq 0 ]; then
            echo "All push attempts failed after 3 retries"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import sys; sys.path.insert(0, 'scanner')
          from telegram_bot import send_workflow_failure
          send_workflow_failure('premarket', '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
