# .github/workflows/colab_sync.yml
# Exports signal_history.json as Colab-ready JSON
# Creates colab_export.json in output/
# Colab reads from GitHub Pages URL directly

name: "🔄 Colab Sync | Flatten gen1 signals to colab_export.json | Manual+EOD"

on:
  schedule:
    # Daily 10:45 AM UTC = 4:15 PM IST (after EOD)
    - cron: '45 10 * * 1-5'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pull latest output files
        run: |
          git fetch origin
          git checkout origin/main -- output/ || true

      - name: Run colab sync
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: python scanner/colab_sync.py

      - name: Commit export
        run: |
          git config --global user.email "scanner@tietiy"
          git config --global user.name  "TIE TIY Scanner"
          git add output/colab_export.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No export changes"
            exit 0
          fi
          git commit -m "chore: colab export $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          python -c "
          import sys; sys.path.insert(0, 'scanner')
          from telegram_bot import send_workflow_failure
          send_workflow_failure('colab_sync', '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
