name: Morning Scan 8:45 AM IST

on:
  schedule:
    - cron: '15 3 * * 1-5'   # 8:45 AM IST Mon-Fri
  workflow_dispatch:           # manual trigger

# ── STEP 23 CHANGE ───────────────────────────────────
# Prevents race condition if workflow_dispatch
# is triggered while scheduled run is still active
# cancel-in-progress: false = queue, never kill
concurrency:
  group: tietiy-scan
  cancel-in-progress: false
# ── END CHANGE ────────────────────────────────────────

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            yfinance \
            pandas \
            numpy \
            requests \
            pywebpush>=1.14.0 \
            cryptography

      - name: Run morning scan
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_CLAIM_EMAIL: ${{ secrets.VAPID_CLAIM_EMAIL }}
          PUSH_PIN:          ${{ secrets.PUSH_PIN }}
        run: |
          export PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/scanner
          cd $GITHUB_WORKSPACE/scanner && python main.py morning

      - name: Commit outputs
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add output/ data/ || true
          git diff --staged --quiet || \
            git commit -m \
            "Scan $(date '+%Y-%m-%d %H:%M') IST"
          git pull --rebase origin main || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
