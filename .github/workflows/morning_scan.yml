# .github/workflows/morning_scan.yml
# Purpose: Daily morning scan — 188 stocks
#          Detects UP_TRI, DOWN_TRI, BULL_PROXY signals
#          Scores, filters, sends Telegram + commits output
# Trigger: cron-job.org @ 8:45 AM IST Mon-Fri (workflow_dispatch)
# Sequence: After heartbeat (8:30), before scan_watchdog (9:02)
# Touches: output/signal_history.json, meta.json, scan_log.json,
#          rejected_log.json, mini_log.json + Telegram morning brief
# Failure mode: Continue-on-error scan, then commit attempt
#               + Telegram alert via send_workflow_failure
#
# Architecture v2 (Apr 22 2026):
# - cron-job.org triggered (precision-critical, must complete by 9:15)
# - workflow_dispatch only (no GitHub schedule to avoid duplicate)
# - concurrency group prevents overlapping scans

name: "☀️ Morning Scan | 188stocks UP-TRI DOWN-TRI BULL-PROXY+Telegram | 8:45 AM IST cron-job.org"

on:
  workflow_dispatch:

concurrency:
  group: tietiy-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run morning scan
        id: scan
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_CLAIM_EMAIL: ${{ secrets.VAPID_CLAIM_EMAIL }}
          PUSH_PIN:          ${{ secrets.PUSH_PIN }}
        run: |
          cd "$GITHUB_WORKSPACE/scanner"
          python main.py morning
        continue-on-error: true

      - name: Commit and push outputs
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add output/ data/ quarantine/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          SCAN_RESULT="${{ steps.scan.outcome }}"
          if [ "$SCAN_RESULT" = "failure" ]; then
            COMMIT_MSG="Morning scan FAILED $(date '+%Y-%m-%d %H:%M IST') — partial output"
          else
            COMMIT_MSG="Morning scan $(date '+%Y-%m-%d %H:%M IST')"
          fi
          git commit -m "$COMMIT_MSG"
          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      - name: Notify on failure
        if: steps.scan.outcome == 'failure'
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          python -c "
          import sys; sys.path.insert(0, 'scanner')
          from telegram_bot import send_workflow_failure
          send_workflow_failure('morning_scan', '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
