name: Morning Scan 8:45 AM IST

on:
  schedule:
    - cron: '15 3 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests

      - name: Run morning scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export PYTHONPATH=$GITHUB_WORKSPACE/scanner
          cd scanner && python main.py morning

      - name: Commit outputs
        run: |
          git config user.name "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          mkdir -p scanner/output scanner/journal
          git add -f scanner/output/ scanner/journal/ || true
          git status
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Scanner run $(date '+%Y-%m-%d %H:%M')"
          git push
