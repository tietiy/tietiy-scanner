name: Morning Scan 8:45 AM IST

on:
  workflow_dispatch:

concurrency:
  group: tietiy-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests pywebpush cryptography

      - name: Run morning scan
        id: scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_CLAIM_EMAIL: ${{ secrets.VAPID_CLAIM_EMAIL }}
          PUSH_PIN: ${{ secrets.PUSH_PIN }}
        run: |
          cd "$GITHUB_WORKSPACE/scanner"
          python main.py morning
        continue-on-error: true

      - name: Commit and push outputs
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "TIE TIY Bot"
          git config user.email "bot@tietiy.com"

          git add output/ data/ quarantine/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          SCAN_RESULT="${{ steps.scan.outcome }}"

          if [ "$SCAN_RESULT" = "failure" ]; then
            COMMIT_MSG="🔴 Scan $(date '+%Y-%m-%d %H:%M') IST [FAILED]"
          else
            COMMIT_MSG="🟢 Scan $(date '+%Y-%m-%d %H:%M') IST"
          fi

          git commit -m "$COMMIT_MSG"

          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && break

            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      - name: Alert on failure
        if: failure() || steps.scan.outcome == 'failure'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_NAME: "Morning Scan"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          pip install requests --quiet
          python scanner/alert_failure.py
