# .github/workflows/open_validate.yml
# Fetches actual 9:15 AM open prices for all entering signals
# Calculates gap%, sets entry_valid flag
# Triggered by cron-job.org at 9:27 AM IST + retries 9:57, 10:27

name: "📋 Open Validate | Actual 9:15open gap% entry-valid+Telegram | 9:27 AM IST Auto"

on:
  workflow_dispatch:

concurrency:
  group: tietiy-open-validate
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run open validator
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: python scanner/open_validator.py

      - name: Commit and push results
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add output/open_prices.json \
                  output/signal_history.json \
                  output/signal_history.backup.json || true
          git diff --cached --quiet && \
            echo "No changes to commit" && exit 0
          git commit -m "Open validation $(date +'%Y-%m-%d %H:%M IST')"
          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          python -c "
          import sys; sys.path.insert(0, 'scanner')
          from telegram_bot import send_workflow_failure
          send_workflow_failure('open_validate', '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
