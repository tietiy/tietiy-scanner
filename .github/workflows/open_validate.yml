# .github/workflows/open_validate.yml
# Purpose: Fetch actual 9:15 AM open prices for entering signals
#          Calculate gap%, set entry_valid flag
#          Internally trigger Day 6 outcome resolution (D6B)
# Trigger: cron-job.org @ 9:27 AM IST Mon-Fri (workflow_dispatch)
#          Optional retries via cron-job.org at 9:57, 10:27 if needed
# Sequence: 12 min after market open (9:15), captures actual entry data
# Touches: output/open_prices.json, signal_history.json,
#          signal_history.backup.json, backups/
# Failure mode: Telegram alert via send_workflow_failure
#
# Architecture v2 (Apr 22 2026):
# - cron-job.org triggered (precision-critical, 9:27 sharp)
# - workflow_dispatch only (no GitHub schedule)
# - concurrency group prevents overlapping runs
#
# Phase 2 Session 2 (D6C) preserved:
# - Internally triggers outcome_evaluator via _trigger_day6_resolution()
# - Same-day Day 6 resolution
# - Commit may contain both entry validations AND Day 6 outcomes

name: "📋 Open Validate | 9:15 open + gap% + D6 resolve + Telegram | 9:27 AM IST cron-job.org"

on:
  workflow_dispatch:

concurrency:
  group: tietiy-open-validate
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run open validator (includes D6B Day 6 trigger)
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: python scanner/open_validator.py

      - name: Commit and push results
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add output/open_prices.json \
                  output/signal_history.json \
                  output/signal_history.backup.json \
                  backups/ || true
          git diff --cached --quiet && \
            echo "No changes to commit" && exit 0
          git commit -m "Open validate + D6 resolve $(date +'%Y-%m-%d %H:%M IST')"
          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          python -c "
          import sys; sys.path.insert(0, 'scanner')
          from telegram_bot import send_workflow_failure
          send_workflow_failure('open_validate', '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
