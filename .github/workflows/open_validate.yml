name: Open Price Validation 9:25 AM IST

on:   
  workflow_dispatch:

concurrency:
  group: tietiy-open-validate
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests \
            pywebpush cryptography --break-system-packages

      - name: Run open validator
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/scanner
          cd $GITHUB_WORKSPACE/scanner
          python open_validator.py

      - name: Commit and push results
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"

          # Stage output files first before any git operations
          git add output/open_prices.json \
                  output/signal_history.json \
                  output/signal_history.backup.json || true

          # Check if there is anything to commit
          git diff --cached --quiet && \
            echo "No changes to commit — exiting cleanly" && exit 0

          # Commit locally first
          git commit -m "Open validation $(date +'%Y-%m-%d %H:%M IST')"

          # Then push with retry
          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
              echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done
