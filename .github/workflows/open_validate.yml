name: Open Price Validation 9:25 AM IST

on:
  schedule:
    - cron: '55 3 * * 1-5'
  workflow_dispatch:

concurrency:
  group: tietiy-scan
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run open validation
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          export PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/scanner
          cd $GITHUB_WORKSPACE/scanner && python open_validator.py

      - name: Commit and push outputs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add output/open_prices.json output/signal_history.json output/signal_history.backup.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Open validation $(date '+%Y-%m-%d %H:%M') IST"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done
