name: Diagnostic Check

on:
  schedule:
    - cron: '0 3 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Check mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - quick
      telegram:
        description: 'Send Telegram report'
        required: false
        default: true
        type: boolean

jobs:
  diagnostic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Build args
        id: args
        run: |
          ARGS=""
          if [ "${{ inputs.mode }}" = "quick" ]; then
            ARGS="$ARGS --quick"
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --telegram"
          elif [ "${{ inputs.telegram }}" = "true" ]; then
            ARGS="$ARGS --telegram"
          fi
          echo "ARGS=$ARGS" >> $GITHUB_OUTPUT

      - name: Run Diagnostic
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          python scanner/diagnostic.py ${{ steps.args.outputs.ARGS }} || true
