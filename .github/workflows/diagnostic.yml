# .github/workflows/diagnostic.yml
# Purpose: Daily post-market system diagnostic
#          Checks data files, schema, signal counts, overdue
#          Self-heals safe issues and commits if fixes applied
# Trigger: GitHub schedule — 4:30 PM IST Mon-Fri (post-market)
# Sequence: Runs after eod_master (3:35 PM) completes
# Touches: output/ (if heal fixes applied), Telegram report
# Failure mode: Telegram alert via send_workflow_failure
#
# Architecture v2 (Apr 22 2026):
# - GitHub schedule (drift-tolerant, post-market)
# - 4:30 PM IST after market close + EOD settlement
# - Manual mode supports quick check, heal toggle, telegram toggle

name: "🩺 Diagnostic | Files+Schema+SignalCount+Overdue+Self-heal | 4:30 PM IST Daily"

on:
  schedule:
    # 11:00 AM UTC = 4:30 PM IST Mon-Fri (post-market)
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Check mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - quick
      heal:
        description: 'Run self-heal after check'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      telegram:
        description: 'Send Telegram report'
        required: false
        default: true
        type: boolean

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Pull latest output files
        run: |
          git fetch origin
          git checkout origin/main -- output/ || true

      - name: Build args
        id: args
        run: |
          ARGS=""
          if [ "${{ inputs.mode }}" = "quick" ]; then
            ARGS="$ARGS --quick"
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --heal --telegram"
          else
            if [ "${{ inputs.heal }}" = "true" ]; then
              ARGS="$ARGS --heal"
            fi
            if [ "${{ inputs.telegram }}" = "true" ]; then
              ARGS="$ARGS --telegram"
            fi
          fi
          echo "ARGS=$ARGS" >> $GITHUB_OUTPUT

      - name: Run Diagnostic
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          set +e
          python scanner/diagnostic.py ${{ steps.args.outputs.ARGS }}
          EXIT=$?
          if [ $EXIT -ne 0 ]; then
            echo "Diagnostic exited with code $EXIT (warnings or errors found)"
            echo "DIAG_EXIT=$EXIT" >> $GITHUB_ENV
          fi
          exit 0

      - name: Commit self-heal changes
        if: github.event_name == 'schedule' || inputs.heal == 'true'
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add output/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No self-heal changes to commit"
            exit 0
          fi
          git commit -m "chore: diagnostic self-heal $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          python -c "
          import sys; sys.path.insert(0, 'scanner')
          from telegram_bot import send_workflow_failure
          send_workflow_failure('diagnostic', '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
