name: Telegram Command Responder

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Poll and respond to Telegram commands
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: python scanner/telegram_poll_runner.py

      - name: Commit offset file
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add output/tg_offset.json 2>/dev/null || true
          git diff --cached --quiet && echo "No offset change" && exit 0
          git commit -m "Telegram offset $(date '+%Y-%m-%d %H:%M')"
          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && break
            echo "Attempt $i failed — retrying in 5s..."
            sleep 5
          done
