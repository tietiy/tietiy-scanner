# .github/workflows/stop_check.yml
# Stop proximity check + target hit detection
# Holiday guard — skips on NSE holidays
# Deduplicates same stock per cycle
# Triggered by cron-job.org every 5 min (staggered 2 min from LTP)

name: "🛑 Stop Check | Stop proximity target-hit dedup holiday-guard | Every 5Min Market"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stop-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Create folders
        run: mkdir -p output data

      - name: Run stop check
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: python scanner/stop_alert_writer.py

      - name: Commit stop alerts
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add output/stop_alerts.json
          git diff --cached --quiet && \
            echo "No changes to commit" && exit 0
          git commit -m "Stop check $(date '+%H:%M') IST"
          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          python -c "
          import sys; sys.path.insert(0, 'scanner')
          from telegram_bot import send_workflow_failure
          send_workflow_failure('stop_check', '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
