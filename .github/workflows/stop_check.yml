# .github/workflows/stop_check.yml
# Purpose: Stop proximity check + target hit detection
#          Holiday guard — skips on NSE holidays/weekends
#          Deduplicates same stock per cycle
# Trigger: cron-job.org every 5 min during market hours
#          (+2 min offset from ltp_updater to stagger load)
#          (9:32 AM - 3:32 PM IST = 4:02 - 10:02 UTC)
# Sequence: Runs 76 times per trading day, 2 min after each LTP update
# Touches: output/stop_alerts.json, stop_alerts_sent.json,
#          target_alerts_sent.json + Telegram alerts
# Failure mode: Telegram alert via send_workflow_failure
#
# Architecture v2 (Apr 22 2026):
# - cron-job.org triggered (precision-critical, 5-min cadence)
# - workflow_dispatch only (no GitHub schedule)
# - +2 min stagger from ltp_updater so LTP data is fresh when read
# - cron-job.org expression: 2-57/5 4-10 * * 1-5

name: "🛑 Stop Check | Stop proximity target-hit dedup holiday-guard | Every 5Min +2offset cron-job.org"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stop-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Create folders
        run: mkdir -p output data

      - name: Run stop check
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: python scanner/stop_alert_writer.py

      - name: Commit stop alerts
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add output/stop_alerts.json \
                  output/stop_alerts_sent.json \
                  output/target_alerts_sent.json
          git diff --cached --quiet && \
            echo "No changes to commit" && exit 0
          git commit -m "Stop check $(date '+%H:%M') IST"
          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          python -c "
          import sys; sys.path.insert(0, 'scanner')
          from telegram_bot import send_workflow_failure
          send_workflow_failure('stop_check', '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
