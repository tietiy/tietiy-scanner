name: Stop Check Every 30 Min

on:
  schedule:
    - cron: '45 3 * * 1-5'
    - cron: '15 4 * * 1-5'
    - cron: '45 4 * * 1-5'
    - cron: '15 5 * * 1-5'
    - cron: '45 5 * * 1-5'
    - cron: '15 6 * * 1-5'
    - cron: '45 6 * * 1-5'
    - cron: '15 7 * * 1-5'
    - cron: '45 7 * * 1-5'
    - cron: '15 8 * * 1-5'
    - cron: '45 8 * * 1-5'
    - cron: '15 9 * * 1-5'
    - cron: '45 9 * * 1-5'
    - cron: '5 10 * * 1-5'
  workflow_dispatch:

jobs:
  stop-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests

      - name: Run stop check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd scanner
          python main.py stops

      - name: Commit journal updates
        run: |
          git config user.name "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add journal/ || true
          git diff --staged --quiet || git commit -m "Stop check $(date '+%H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
