name: Stop Check Every 30 Min

on:
  schedule:
    # ── Market hours 9:30 AM to 3:30 PM IST ──────
    # UTC = IST - 5:30
    - cron: '45 3 * * 1-5'   #  9:15 AM IST — skip, scan running
    - cron: '15 4 * * 1-5'   #  9:45 AM IST
    - cron: '45 4 * * 1-5'   # 10:15 AM IST
    - cron: '15 5 * * 1-5'   # 10:45 AM IST
    - cron: '45 5 * * 1-5'   # 11:15 AM IST
    - cron: '15 6 * * 1-5'   # 11:45 AM IST
    - cron: '45 6 * * 1-5'   # 12:15 PM IST
    - cron: '15 7 * * 1-5'   # 12:45 PM IST
    - cron: '45 7 * * 1-5'   #  1:15 PM IST
    - cron: '15 8 * * 1-5'   #  1:45 PM IST
    - cron: '45 8 * * 1-5'   #  2:15 PM IST
    - cron: '15 9 * * 1-5'   #  2:45 PM IST
    - cron: '45 9 * * 1-5'   #  3:15 PM IST
    - cron: '5 10 * * 1-5'   #  3:35 PM IST — last check
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stop-check:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'


      - name: Install dependencies
        run: |
          pip install \
            yfinance \
            pandas \
            numpy \
            requests

      - name: Create folders
        run: |
          mkdir -p output data

      - name: Run stop check
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:         ${{ secrets.GH_TOKEN }}
        run: |
          export PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/scanner
          cd $GITHUB_WORKSPACE/scanner && python stop_alert_writer.py

      - name: Commit and push stop alerts
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name  "TIE TIY Bot"
          git config user.email "bot@tietiy.com"
          git add output/stop_alerts.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Stop check $(date '+%H:%M') IST"
          for i in 1 2 3; do
            git pull --rebase origin main \
              && git push origin HEAD:main \
              && echo "Push succeeded on attempt $i" \
              && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done
