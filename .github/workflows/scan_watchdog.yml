name: Scan Watchdog 9:00 AM IST

on:
  schedule:
    - cron: '30 3 * * 1-5'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest

    steps:

      - name: Check scan and self-heal if missed
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: tietiy/tietiy-scanner
        run: |
          TODAY=$(TZ='Asia/Kolkata' date '+%Y-%m-%d')
          echo "Watchdog running — today: $TODAY"

          META_URL="https://tietiy.github.io/tietiy-scanner/meta.json"
          HTTP_CODE=$(curl -s -o /tmp/meta.json -w "%{http_code}" --max-time 10 "$META_URL" || echo "000")
          echo "meta.json HTTP: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            SCAN_DATE=$(python3 -c "
          import json
          try:
              data = json.load(open('/tmp/meta.json'))
              print(data.get('market_date', 'unknown'))
          except:
              print('error')
          ")
          else
            SCAN_DATE="unreachable"
          fi

          echo "Last scan date: $SCAN_DATE"

          if [ "$SCAN_DATE" = "$TODAY" ]; then
            echo "Scan ran today — all good"
            exit 0
          fi

          echo "Scan missed — auto-triggering"

          TRIGGER_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/workflows/morning_scan.yml/dispatches" \
            -d '{"ref":"main"}')

          TRIGGER_HTTP=$(echo "$TRIGGER_RESPONSE" | tail -1)
          echo "Trigger response: $TRIGGER_HTTP"

          if [ "$TRIGGER_HTTP" = "204" ]; then
            MSG="TIE TIY WATCHDOG%0A%0AMorning scan missed at 8:45 AM%0AAuto-triggered at 9:00 AM%0AScan running now."
          else
            MSG="TIE TIY WATCHDOG%0A%0AMorning scan missed.%0AAuto-trigger FAILED (${TRIGGER_HTTP})%0ARun manually: GitHub Actions"
          fi

          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}"
