# .github/workflows/scan_watchdog.yml
# Purpose: Verify morning_scan completed — retrigger if missed
#          Also retriggers if scan found 0 signals on trading day
# Trigger: cron-job.org @ 9:02 AM IST Mon-Fri (workflow_dispatch)
# Sequence: 17 min after morning_scan (8:45), 13 min before market open
# Touches: Telegram alert, optional morning_scan.yml retrigger
# Failure mode: Telegram alert sent inline (no separate notify step)
#
# Architecture v2 (Apr 22 2026):
# - cron-job.org triggered (precision-critical, must precede 9:15 open)
# - workflow_dispatch only (no GitHub schedule)
#
# WD1 logic preserved (Apr 17 fix):
# - Cache-bust meta.json fetch (bypass GitHub Pages CDN stale)
# - Read scan_time field — if populated, scan completed → healthy
# - 15-min grace window before 9:15 AM IST (let scan finish)
# - 0-signals retry only after 10:00 AM IST on trading days
#
# WAVE 4 FIX (Apr 23 2026 night):
# - G1: False-positive elimination. On Apr 22 at 09:02 AM,
#       morning scan succeeded at 08:47 but GitHub Pages
#       deploy hadn't completed yet. Watchdog fetched stale
#       meta.json → saw yesterday's date → triggered false
#       "Morning scan missed" alert + redundant rescan.
#
#       Fix: Check GitHub Actions API (workflows/morning_scan.yml/runs)
#       FIRST to see if scan ran today. Pages CDN is only
#       consulted as fallback. API reflects actual workflow
#       state immediately, no CDN propagation lag.
#
# - G9: Dedup guard. If morning_scan is currently in_progress
#       OR completed within last 30 min, skip trigger. Prevents
#       redundant scans if watchdog over-fires.

name: "👁️ Scan Watchdog | Verify scan ran retrigger if missed+Telegram | 9:02 AM IST cron-job.org"

on:
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check scan health and retry if needed
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:         ${{ secrets.GH_TOKEN }}
          REPO:             tietiy/tietiy-scanner
        run: |
          TODAY=$(TZ='Asia/Kolkata' date '+%Y-%m-%d')
          IST_HOUR=$(TZ='Asia/Kolkata' date '+%H')
          IST_MIN=$(TZ='Asia/Kolkata' date '+%M')
          IST_TIME_MINS=$(( 10#${IST_HOUR} * 60 + 10#${IST_MIN} ))
          echo "Watchdog running — today: $TODAY | IST: ${IST_HOUR}:${IST_MIN}"

          # ─────────────────────────────────────────────
          # G1 WAVE 4 FIX: Check GitHub Actions API FIRST
          # ─────────────────────────────────────────────
          # Pages CDN can lag 2-5 min behind actual workflow
          # state. Actions API reflects reality immediately.
          # Strategy:
          #   1. Query morning_scan.yml runs created today
          #   2. If ANY run exists today → scan DID fire
          #      - If success → healthy, exit (unless 0 signals)
          #      - If in_progress → healthy, wait
          #      - If failure → Telegram alert, don't re-fire
          #        (let scheduled retry handle via cron)
          #   3. If NO run today → fallback to meta.json check
          #      (handles edge case where API is down)
          # ─────────────────────────────────────────────

          echo ""
          echo "=== G1: GitHub Actions API check ==="

          # Compute UTC window for "today IST" — scans that
          # started today in IST.
          # IST midnight = UTC 18:30 previous day.
          IST_START_UTC=$(TZ='UTC' date -d "${TODAY}T00:00:00+05:30" '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || echo "")
          if [ -z "$IST_START_UTC" ]; then
            IST_START_UTC="${TODAY}T00:00:00Z"
          fi
          echo "Filter: runs created >= $IST_START_UTC"

          RUNS_API="https://api.github.com/repos/${REPO}/actions/workflows/morning_scan.yml/runs?created=>=${IST_START_UTC}&per_page=20"

          RUNS_JSON=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --max-time 15 \
            "$RUNS_API" || echo '{"workflow_runs":[]}')

          RUN_COUNT=$(echo "$RUNS_JSON" | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              runs = d.get('workflow_runs', [])
              print(len(runs))
          except Exception:
              print(0)
          ")

          RECENT_STATUS=$(echo "$RUNS_JSON" | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              runs = d.get('workflow_runs', [])
              if runs:
                  r = runs[0]
                  print(f\"{r.get('status','unknown')}:{r.get('conclusion','null')}\")
              else:
                  print('none:none')
          except Exception:
              print('error:error')
          ")

          RECENT_AGE_MIN=$(echo "$RUNS_JSON" | python3 -c "
          import json, sys
          from datetime import datetime, timezone
          try:
              d = json.load(sys.stdin)
              runs = d.get('workflow_runs', [])
              if runs:
                  updated = runs[0].get('updated_at')
                  if updated:
                      dt = datetime.fromisoformat(updated.replace('Z','+00:00'))
                      age = (datetime.now(timezone.utc) - dt).total_seconds() / 60
                      print(f'{age:.1f}')
                  else:
                      print('-1')
              else:
                  print('-1')
          except Exception:
              print('-1')
          ")

          echo "API found $RUN_COUNT morning_scan runs today"
          echo "Most recent status: $RECENT_STATUS (age ${RECENT_AGE_MIN} min)"

          STATUS_PART=$(echo "$RECENT_STATUS" | cut -d: -f1)
          CONCLUSION_PART=$(echo "$RECENT_STATUS" | cut -d: -f2)

          TRIGGER=false

          # ─────────────────────────────────────────────
          # G9 WAVE 4 FIX: Dedup guard
          # ─────────────────────────────────────────────
          if [ "$RUN_COUNT" -gt "0" ] && [ "$STATUS_PART" != "error" ]; then

            # In-progress — do not interrupt
            if [ "$STATUS_PART" = "in_progress" ] \
               || [ "$STATUS_PART" = "queued" ] \
               || [ "$STATUS_PART" = "waiting" ]; then
              echo "G9: morning_scan is $STATUS_PART — skipping watchdog trigger"
              exit 0
            fi

            # Recently succeeded — no action needed
            if [ "$STATUS_PART" = "completed" ] \
               && [ "$CONCLUSION_PART" = "success" ]; then
              AGE_INT=$(python3 -c "
          try:
              print(int(float('${RECENT_AGE_MIN}')))
          except Exception:
              print(999)
          ")
              if [ "$AGE_INT" -lt "30" ]; then
                echo "G1: morning_scan succeeded ${RECENT_AGE_MIN} min ago — healthy, exiting"

                # Still do the 0-signals retry check
                CACHE_BUST=$(date +%s)
                META_URL="https://tietiy.github.io/tietiy-scanner/meta.json?cb=${CACHE_BUST}"
                curl -s -H "Cache-Control: no-cache" \
                  --max-time 10 -o /tmp/meta.json \
                  "$META_URL" || true
                if [ -f /tmp/meta.json ]; then
                  SIGNALS_FOUND=$(python3 -c "
          import json
          try:
              print(json.load(open('/tmp/meta.json')).get('signals_found', -1))
          except Exception:
              print(-1)
          ")
                  IS_TRADING=$(python3 -c "
          import json
          try:
              print('true' if json.load(open('/tmp/meta.json')).get('is_trading_day', False) else 'false')
          except Exception:
              print('false')
          ")
                  if [ "$SIGNALS_FOUND" = "0" ] \
                     && [ "$IS_TRADING" = "true" ] \
                     && [ "$IST_TIME_MINS" -ge "600" ]; then
                    echo "Healthy run but 0 signals at/after 10AM on trading day — re-running"
                    REASON="Healthy scan found 0 signals on trading day — retrying"
                    TRIGGER=true
                  else
                    echo "All healthy — exiting"
                    exit 0
                  fi
                else
                  echo "meta.json unreachable but API confirms scan succeeded — exiting healthy"
                  exit 0
                fi
              else
                echo "Most recent scan completed > 30 min ago — continuing to full check"
              fi
            fi

            # Recently failed — alert but don't re-trigger
            if [ "$STATUS_PART" = "completed" ] \
               && [ "$CONCLUSION_PART" = "failure" ]; then
              echo "G1: most recent morning_scan FAILED — alerting"
              MSG="TIE TIY WATCHDOG%0A%0AReason: Morning scan FAILED (run ${RECENT_AGE_MIN} min ago)%0AAction: Check GitHub Actions logs%0ANOT auto-retriggering to prevent alert storm."
              curl -s -X POST \
                "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
                -d "chat_id=${TELEGRAM_CHAT_ID}" \
                -d "text=${MSG}"
              exit 0
            fi
          fi

          # ─────────────────────────────────────────────
          # FALLBACK: Pages meta.json check (if API path
          # didn't conclude). Preserves WD1 logic.
          # ─────────────────────────────────────────────
          echo ""
          echo "=== Fallback: Pages meta.json check ==="

          CACHE_BUST=$(date +%s)
          META_URL="https://tietiy.github.io/tietiy-scanner/meta.json?cb=${CACHE_BUST}"
          HTTP_CODE=$(curl -s -o /tmp/meta.json \
            -H "Cache-Control: no-cache" \
            -H "Pragma: no-cache" \
            -w "%{http_code}" --max-time 15 \
            "$META_URL" || echo "000")
          echo "meta.json HTTP: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            SCAN_DATE=$(python3 -c "
          import json
          try:
              data = json.load(open('/tmp/meta.json'))
              print(data.get('market_date', 'unknown'))
          except:
              print('error')
          ")
            SCAN_TIME=$(python3 -c "
          import json
          try:
              data = json.load(open('/tmp/meta.json'))
              print(data.get('scan_time', '') or '')
          except:
              print('')
          ")
            SIGNALS_FOUND=$(python3 -c "
          import json
          try:
              data = json.load(open('/tmp/meta.json'))
              print(data.get('signals_found', -1))
          except:
              print(-1)
          ")
            IS_TRADING=$(python3 -c "
          import json
          try:
              data = json.load(open('/tmp/meta.json'))
              print('true' if data.get('is_trading_day', False) else 'false')
          except:
              print('false')
          ")
          else
            SCAN_DATE="unreachable"
            SCAN_TIME=""
            SIGNALS_FOUND="-1"
            IS_TRADING="false"
          fi

          echo "Last scan date : $SCAN_DATE"
          echo "Scan time      : $SCAN_TIME"
          echo "Signals found  : $SIGNALS_FOUND"
          echo "Is trading day : $IS_TRADING"

          if [ "$SCAN_DATE" = "$TODAY" ]; then
            if [ -n "$SCAN_TIME" ]; then
              echo "Scan healthy — ran today at ${SCAN_TIME}, signals:${SIGNALS_FOUND}"
              if [ "$SIGNALS_FOUND" = "0" ] \
                 && [ "$IS_TRADING" = "true" ] \
                 && [ "$IST_TIME_MINS" -ge "600" ]; then
                echo "0 signals at 10AM on trading day — retrying"
                REASON="0 signals at scan time — data retry"
                TRIGGER=true
              else
                echo "All healthy — exiting"
                exit 0
              fi
            else
              GRACE_END_MINS=555
              if [ "$IST_TIME_MINS" -lt "$GRACE_END_MINS" ]; then
                echo "Date matches today but scan_time empty — within grace window (before 9:15 AM). Not triggering."
                exit 0
              else
                echo "Date matches today but scan_time still empty after 9:15 AM — scan may have failed"
                REASON="Scan ran today but scan_time missing after 9:15 AM"
                TRIGGER=true
              fi
            fi
          else
            echo "Scan missed today (last: $SCAN_DATE) — triggering now"
            REASON="Morning scan missed"
            TRIGGER=true
          fi

          if [ "$TRIGGER" = "true" ]; then
            TRIGGER_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/actions/workflows/morning_scan.yml/dispatches" \
              -d '{"ref":"main"}')

            TRIGGER_HTTP=$(echo "$TRIGGER_RESPONSE" | tail -1)
            echo "Trigger response: $TRIGGER_HTTP"

            if [ "$TRIGGER_HTTP" = "204" ]; then
              MSG="TIE TIY WATCHDOG%0A%0AReason: ${REASON}%0AAction: Scan triggered now%0ASignals will arrive shortly."
            else
              MSG="TIE TIY WATCHDOG%0A%0AReason: ${REASON}%0ATrigger FAILED (${TRIGGER_HTTP})%0ARun manually from GitHub Actions."
            fi

            curl -s -X POST \
              "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MSG}"
          fi
