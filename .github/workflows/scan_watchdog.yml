name: Scan Watchdog

on:
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check scan health and retry if needed
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: tietiy/tietiy-scanner
        run: |
          TODAY=$(TZ='Asia/Kolkata' date '+%Y-%m-%d')
          IST_HOUR=$(TZ='Asia/Kolkata' date '+%H')
          echo "Watchdog running — today: $TODAY | IST hour: $IST_HOUR"

          META_URL="https://tietiy.github.io/tietiy-scanner/meta.json"
          HTTP_CODE=$(curl -s -o /tmp/meta.json -w "%{http_code}" --max-time 10 "$META_URL" || echo "000")
          echo "meta.json HTTP: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            SCAN_DATE=$(python3 -c "
          import json
          try:
              data = json.load(open('/tmp/meta.json'))
              print(data.get('market_date', 'unknown'))
          except:
              print('error')
          ")
            SIGNALS_FOUND=$(python3 -c "
          import json
          try:
              data = json.load(open('/tmp/meta.json'))
              print(data.get('signals_found', -1))
          except:
              print(-1)
          ")
            IS_TRADING=$(python3 -c "
          import json
          try:
              data = json.load(open('/tmp/meta.json'))
              print('true' if data.get('is_trading_day', False) else 'false')
          except:
              print('false')
          ")
          else
            SCAN_DATE="unreachable"
            SIGNALS_FOUND="-1"
            IS_TRADING="false"
          fi

          echo "Last scan date: $SCAN_DATE"
          echo "Signals found: $SIGNALS_FOUND"
          echo "Is trading day: $IS_TRADING"

          # ── CASE 1: Scan never ran today ──────────────────────
          if [ "$SCAN_DATE" != "$TODAY" ]; then
            echo "Scan missed today — triggering now"
            REASON="Morning scan missed"
            TRIGGER=true

          # ── CASE 2: Scan ran but found 0 signals on a trading day ──
          elif [ "$SIGNALS_FOUND" = "0" ] && [ "$IS_TRADING" = "true" ] && [ "$IST_HOUR" -ge "10" ]; then
            echo "Scan ran today but 0 signals — data likely not ready at 8:45AM — retrying"
            REASON="0 signals at 8:45AM — data retry at 10AM"
            TRIGGER=true

          # ── CASE 3: All good ──────────────────────────────────
          else
            echo "Scan healthy — date:$SCAN_DATE signals:$SIGNALS_FOUND"
            exit 0
          fi

          # ── TRIGGER RE-SCAN ───────────────────────────────────
          TRIGGER_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/workflows/morning_scan.yml/dispatches" \
            -d '{"ref":"main"}')

          TRIGGER_HTTP=$(echo "$TRIGGER_RESPONSE" | tail -1)
          echo "Trigger response: $TRIGGER_HTTP"

          if [ "$TRIGGER_HTTP" = "204" ]; then
            MSG="TIE TIY WATCHDOG%0A%0AReason: ${REASON}%0AAction: Scan triggered now%0ASignals will arrive shortly."
          else
            MSG="TIE TIY WATCHDOG%0A%0AReason: ${REASON}%0ATrigger FAILED (${TRIGGER_HTTP})%0ARun manually from GitHub Actions."
          fi

          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}"
