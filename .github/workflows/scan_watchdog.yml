# .github/workflows/scan_watchdog.yml
# Checks if morning scan ran — retriggers if missed
# Also retriggers if scan found 0 signals on trading day
# Triggered by cron-job.org at 9:02 AM IST
#
# V2 FIXES:
# WD1: Grace window + scan_time check — watchdog was
#      declaring "Morning scan missed" even when scan
#      completed at 8:47 AM. Two root causes fixed:
#      1. Added cache-bust param to meta.json fetch so
#         stale GitHub Pages CDN response is bypassed.
#      2. Read scan_time field from meta — if scan ran
#         today (scan_time exists and date matches),
#         declare healthy regardless of CDN lag.
#      3. Added 15-min grace window: if IST time is
#         before 9:15 AM and date matches today, give
#         the scan time to complete before retrying.

name: "👁️ Scan Watchdog | Checks scan ran retriggers if missed+Telegram | 9:02 AM IST Auto"

on:
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check scan health and retry if needed
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:         ${{ secrets.GH_TOKEN }}
          REPO:             tietiy/tietiy-scanner
        run: |
          TODAY=$(TZ='Asia/Kolkata' date '+%Y-%m-%d')
          IST_HOUR=$(TZ='Asia/Kolkata' date '+%H')
          IST_MIN=$(TZ='Asia/Kolkata' date '+%M')
          IST_TIME_MINS=$(( IST_HOUR * 60 + IST_MIN ))
          echo "Watchdog running — today: $TODAY | IST: ${IST_HOUR}:${IST_MIN}"

          # WD1 FIX: Cache-bust the meta.json fetch so
          # GitHub Pages CDN does not serve stale data.
          # Without this, the scan can complete at 8:47 AM
          # but watchdog at 9:02 AM still sees yesterday's
          # meta.json from CDN cache and triggers a rescan.
          CACHE_BUST=$(date +%s)
          META_URL="https://tietiy.github.io/tietiy-scanner/meta.json?cb=${CACHE_BUST}"
          HTTP_CODE=$(curl -s -o /tmp/meta.json \
            -H "Cache-Control: no-cache" \
            -H "Pragma: no-cache" \
            -w "%{http_code}" --max-time 15 \
            "$META_URL" || echo "000")
          echo "meta.json HTTP: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            SCAN_DATE=$(python3 -c "
          import json
          try:
              data = json.load(open('/tmp/meta.json'))
              print(data.get('market_date', 'unknown'))
          except:
              print('error')
          ")
            # WD1 FIX: Read scan_time field — if this
            # exists and date matches today, scan ran.
            SCAN_TIME=$(python3 -c "
          import json
          try:
              data = json.load(open('/tmp/meta.json'))
              print(data.get('scan_time', '') or '')
          except:
              print('')
          ")
            SIGNALS_FOUND=$(python3 -c "
          import json
          try:
              data = json.load(open('/tmp/meta.json'))
              print(data.get('signals_found', -1))
          except:
              print(-1)
          ")
            IS_TRADING=$(python3 -c "
          import json
          try:
              data = json.load(open('/tmp/meta.json'))
              print('true' if data.get('is_trading_day', False) else 'false')
          except:
              print('false')
          ")
          else
            SCAN_DATE="unreachable"
            SCAN_TIME=""
            SIGNALS_FOUND="-1"
            IS_TRADING="false"
          fi

          echo "Last scan date : $SCAN_DATE"
          echo "Scan time      : $SCAN_TIME"
          echo "Signals found  : $SIGNALS_FOUND"
          echo "Is trading day : $IS_TRADING"

          TRIGGER=false

          if [ "$SCAN_DATE" = "$TODAY" ]; then
            # Date matches today

            # WD1 FIX: If scan_time is populated, the
            # scan completed successfully — always healthy.
            if [ -n "$SCAN_TIME" ]; then
              echo "Scan healthy — ran today at ${SCAN_TIME}, signals:${SIGNALS_FOUND}"

              # Still check 0-signals retry (separate concern)
              if [ "$SIGNALS_FOUND" = "0" ] \
                 && [ "$IS_TRADING" = "true" ] \
                 && [ "$IST_TIME_MINS" -ge "600" ]; then
                # 600 min = 10:00 AM IST — safe to retry
                echo "0 signals at 10AM on trading day — retrying"
                REASON="0 signals at scan time — data retry"
                TRIGGER=true
              else
                echo "All healthy — exiting"
                exit 0
              fi

            else
              # WD1 FIX: Date matches but scan_time empty —
              # scan may still be running or deploy in flight.
              # Apply 15-min grace: before 9:15 AM IST,
              # do not declare missed. Give scan time to
              # complete and meta.json time to deploy.
              GRACE_END_MINS=555
              # 555 min = 9:15 AM IST
              if [ "$IST_TIME_MINS" -lt "$GRACE_END_MINS" ]; then
                echo "Date matches today but scan_time empty — within grace window (before 9:15 AM). Not triggering."
                exit 0
              else
                echo "Date matches today but scan_time still empty after 9:15 AM — scan may have failed"
                REASON="Scan ran today but scan_time missing after 9:15 AM"
                TRIGGER=true
              fi
            fi

          else
            # Date does not match today — scan definitely missed
            echo "Scan missed today (last: $SCAN_DATE) — triggering now"
            REASON="Morning scan missed"
            TRIGGER=true
          fi

          if [ "$TRIGGER" = "true" ]; then
            TRIGGER_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/actions/workflows/morning_scan.yml/dispatches" \
              -d '{"ref":"main"}')

            TRIGGER_HTTP=$(echo "$TRIGGER_RESPONSE" | tail -1)
            echo "Trigger response: $TRIGGER_HTTP"

            if [ "$TRIGGER_HTTP" = "204" ]; then
              MSG="TIE TIY WATCHDOG%0A%0AReason: ${REASON}%0AAction: Scan triggered now%0ASignals will arrive shortly."
            else
              MSG="TIE TIY WATCHDOG%0A%0AReason: ${REASON}%0ATrigger FAILED (${TRIGGER_HTTP})%0ARun manually from GitHub Actions."
            fi

            curl -s -X POST \
              "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MSG}"
          fi
