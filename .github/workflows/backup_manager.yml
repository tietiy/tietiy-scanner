# .github/workflows/backup_manager.yml
# Purpose: Saturday standalone backup of signal_history.json
#          (Weekday backups handled by eod_master.yml Step 1)
# Trigger: GitHub schedule — Saturday 8:30 AM IST
# Sequence: Standalone weekly safety backup
# Touches: output/backups/, signal_history archives
# Failure mode: Telegram alert via send_workflow_failure
#
# Architecture v2 (Apr 22 2026):
# - Removed weekday duplicate cron (eod_master Step 1 handles M-F)
# - Saturday-only schedule preserves weekend snapshot
# - GitHub schedule (drift-tolerant, weekly only)

name: "💾 Backup Saturday | Weekly safety snapshot signal_history+archive | Sat 8:30 AM IST"

on:
  schedule:
    # Saturday 3:00 AM UTC = 8:30 AM IST (weekly safety)
    - cron: '0 3 * * 6'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: false
        default: 'backup'
        type: choice
        options:
          - backup
          - list

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pull latest output files
        run: |
          git fetch origin
          git checkout origin/main -- output/ || true

      - name: Run backup
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          ACTION="${{ github.event.inputs.action || 'backup' }}"
          python -c "
          import sys; sys.path.insert(0, 'scanner')
          from backup_manager import run_backup, _list_backups
          action = '$ACTION'
          if action == 'list':
              backups = _list_backups()
              print(f'Backups found: {len(backups)}')
              for b in backups:
                  print(f'  {b}')
          else:
              run_backup()
          "

      - name: Commit backup files
        run: |
          git config --global user.email "scanner@tietiy"
          git config --global user.name  "TIE TIY Scanner"
          git add output/backups/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No backup changes to commit"
            exit 0
          fi
          git commit -m "chore: Saturday backup $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            echo "Push succeeded on attempt $i" && break
            echo "Push attempt $i failed — retrying in 10s..."
            sleep 10
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:       ${{ github.workspace }}:${{ github.workspace }}/scanner
        run: |
          python -c "
          import sys; sys.path.insert(0, 'scanner')
          from telegram_bot import send_workflow_failure
          send_workflow_failure('backup_manager', '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
